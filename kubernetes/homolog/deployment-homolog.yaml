apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-service
  namespace: homolog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: core-service
  template:
    metadata:
      labels:
        app: core-service
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/lucaspreviato/core-service:release-v1.0.0
          command: ["npx", "prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: core-secrets
                  key: DATABASE_URL
      containers:
        - name: core-container
          image: ghcr.io/lucaspreviato/core-service:release-v1.0.0
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: core-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: core-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: core-secrets
                  key: JWT_SECRET
          ports:
            - containerPort: 8081
